<header class="app-header">
    <div class="logo">
        <img src="assets/LOGO.png" alt="LOGO">
    </div>
    <div class="welcome">BIENVENIDO/A, {{ nickname }}</div>
    <div class="user-icon">
        <img src="assets/perfildonutmordido.jpg" class="avatar" (click)="toggleDropdown()">
        <div class="dropdown" *ngIf="showDropdown">
            <div (click)="logout()">Cerrar Sesión</div>
            <div (click)="openDeleteAccount()">Eliminar Cuenta</div>
            <div (click)="openChangePassword()">Cambiar Contraseña</div>
        </div>
    </div>
</header>
<app-delete-account></app-delete-account>
<app-change-password></app-change-password>
