<h2>Solicitudes Capítulo Diario</h2>
<table border="1" width="100%">
    <tr>
        <th>ID</th>
        <th>User</th>
        <th>Acciones</th>
    </tr>
    <tr *ngFor="let r of rewards">
        <td>{{ r.id }}</td>
        <td>{{ r.userId }}</td>
        <td>
            <div *ngIf="r.id!==null">
                <button class="btn btn-success" (click)="approve(r.id!)">Aprobar</button>
                <button class="btn btn-danger" (click)="reject(r.id!)">Rechazar</button>
            </div>
        </td>
    </tr>
</table>
