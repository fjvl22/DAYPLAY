<h2 mat-dialog-title>Detalle de la traza</h2>
<div mat-dialog-content *ngIf="!loading; else loadingTpl">
    <div *ngIf="errorMessage; else tableTpl" class="alert alert-danger">{{ errorMessage }}</div>
</div>
<ng-template #tableTpl>
    <mat-form-field appearance="fill" style="width: 100%; margin-bottom: 10px;">
        <mat-label>Filtrar trazas</mat-label>
        <input matInput (keyUp)="applyFilter($event)" placeholder="Filtrar por acción o nickname">
    </mat-form-field>
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
        <ng-container matColumnDef="traceDate">
            <th mat-header-cell *matHeaderCellDef>Fecha</th>
            <td mat-cell *matCellDef="let t">{{ t.traceDate | date: 'medium' }}</td>
        </ng-container>
        <ng-container matColumnDef="action">
            <th mat-header-cell *matHeaderCellDef>Acción</th>
            <td mat-cell *matCellDef="let t">{{ t.action }}</td>
        </ng-container>
        <ng-container matColumnDef="notes">
            <th mat-header-cell *matHeaderCellDef>Notas</th>
            <td mat-cell *matCellDef="let t">{{ t.notes || '-' }}</td>
        </ng-container>
        <ng-container matColumnDef="updatedBy">
            <th mat-header-cell *matHeaderCellDef>Actualizado por</th>
            <td mat-cell *matCellDef="let t">{{ getNickname(t.updatedBy) }}</td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
    <mat-paginator [pageSize]="5" showFirstLastButtons></mat-paginator>
</ng-template>
<ng-template #loadingTpl>
    <div class="loading-container" style="text-align: center; padding: 20px;">
        <mat-progress-spinner mode="indeterminate"></mat-progress-spinner>
    </div>
</ng-template>
<mat-dialog-actions align="end">
    <button mat-button (click)="close()">Cerrar</button>
</mat-dialog-actions>
