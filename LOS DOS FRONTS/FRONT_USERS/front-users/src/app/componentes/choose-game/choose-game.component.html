<div class="card">

    <h2 class="card-title">{{ title }}</h2>

    <table class="styled-table">
        <tbody>
            <tr *ngFor="let row of grid">
                <td *ngFor="let game of row" class="cell" (click)="onCellClick()" (mouseenter)="onMouseEnter(game)" (mouseleave)="onMouseLeave()">

                    <div class="cell-content">{{ game?.url || '---' }}</div>

                    <div class="cell-overlay" *ngIf="hoveredGame === game">
                        <h4>{{ game?.name }}</h4>
                        <p>{{ game.description }}</p>
                    </div>

                </td>
            </tr>
        </tbody>
    </table>

</div>
