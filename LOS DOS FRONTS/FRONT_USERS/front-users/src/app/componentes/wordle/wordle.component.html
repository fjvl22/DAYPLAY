<h2>WORDLE</h2>
<div class="board">
    <div class="row" *ngFor="let row of grid; let rowIndex = index">
        <div class="cell" *ngFor="let cell of row; let colIndex = index" [ngClass]="cellStatus[rowIndex][colIndex]">{{ cell }}</div>
    </div>
</div>
<app-keyboard [usedLetters]="usedLetters" [keyClasses]="keyClasses" [gameMode]="'wordle'" (letterPressed)="onLetter($event)" (backpacePressed)="onBackspace()" (enterPressed)="onEnter()"></app-keyboard>
