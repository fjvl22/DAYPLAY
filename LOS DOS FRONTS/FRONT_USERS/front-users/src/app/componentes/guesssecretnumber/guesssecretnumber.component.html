<div class="game-container">
    <h1 class="title">Adivina el Número Secreto</h1>
    <div class="game-box">
        <div class="display">{{ currentInput || '---' }}</div>
        <p class="message">{{ message }}</p>
        <p>Intentos usados: {{ service.getAttempts() }} / 5</p>
        <p>Intentos restantes: {{ service.getRemainingAttempts() }}</p>
        <app-numeric-keyboard (keyPressed)="handleKey($event)"></app-numeric-keyboard>
        <button (click)="submitGuess()" [disabled]="service.isFinished()">Comprobar</button>
    </div>
</div>
