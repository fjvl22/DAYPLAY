<ion-header>
    <ion-toolbar>
      <ion-title>Detalle de la traza</ion-title>
      <ion-buttons slot="end">
        <ion-button (click)="close()">Cerrar</ion-button>
      </ion-buttons>
    </ion-toolbar>
  </ion-header>
  
  <ion-content class="ion-padding">
  
    <div class="ion-text-center" *ngIf="loading">
      <ion-spinner name="crescent"></ion-spinner>
    </div>
  
    <ion-text color="danger" *ngIf="errorMessage">
      {{ errorMessage }}
    </ion-text>
  
    <ng-container *ngIf="!loading && !errorMessage">
  
      <ion-searchbar
        placeholder="Filtrar por acción o usuario"
        (ionInput)="applyFilter($event)">
      </ion-searchbar>
  
      <ion-list>
  
        <ion-item *ngFor="let t of filteredTraces">
  
          <ion-label class="ion-text-wrap">
  
            <h2>{{ t.action }}</h2>
  
            <p>📅 {{ t.traceDate | date:'medium' }}</p>
  
            <p>📝 {{ t.notes || '-' }}</p>
  
            <p>👤 {{ getNickname(t.updatedBy) }}</p>
  
          </ion-label>
  
        </ion-item>
  
      </ion-list>
  
    </ng-container>
  
  </ion-content>
