<ion-header>
    <ion-toolbar>
      <ion-title>Iniciar Sesión</ion-title>
    </ion-toolbar>
  </ion-header>
  
  <ion-content class="login-content">
  
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="form">
  
      <ion-card class="login-card">
  
        <ion-card-header>
          <ion-card-title>Bienvenido</ion-card-title>
        </ion-card-header>
  
        <ion-card-content>
  
          <ion-item>
            <ion-label position="stacked">Nombre de usuario</ion-label>
            <ion-input type="text" formControlName="nickname"></ion-input>
          </ion-item>
  
          <ion-item>
            <ion-label position="stacked">Contraseña</ion-label>
            <ion-input type="password" formControlName="password"></ion-input>
          </ion-item>
  
          <ion-button
            expand="block"
            type="submit"
            [disabled]="loading || loginForm.invalid"
            class="login-btn">
            Entrar
          </ion-button>

          <ion-text>¿Aún no tienes cuenta?</ion-text>

          <ion-button type="button" (click)="goToRegister()">Regístrate Aquí</ion-button>
  
          <ion-text color="medium" *ngIf="loading">
            <p>Cargando...</p>
          </ion-text>
  
          <ion-text color="danger" *ngIf="errorMessage">
            <p>{{ errorMessage }}</p>
          </ion-text>
  
        </ion-card-content>
  
      </ion-card>
  
    </form>
  
  </ion-content>
