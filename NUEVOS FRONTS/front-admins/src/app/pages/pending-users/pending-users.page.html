<ion-content class="ion-padding">

  <h2>Usuarios Pendientes</h2>

  <ion-list>
    <ion-item *ngFor="let u of pending">

      <ion-label>
        <h2>{{ u.person.nickname }}</h2>
        <p>ID: {{ u.personId }}</p>
        <p>Plan: {{ u.planType }}</p>
      </ion-label>

      <ion-button color="success" (click)="approve(u.personId!)">Aprobar</ion-button>

      <ion-button color="danger" (click)="reject(u.personId!)">Rechazar</ion-button>

    </ion-item>
  </ion-list>

</ion-content>
