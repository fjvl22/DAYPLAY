<ion-header>
  <ion-toolbar>
    <ion-title>Adivina el número</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="game-content">

  <div class="game-container">

    <h1 class="title">🔢 Adivina el Número Secreto</h1>

    <div class="game-box">

      <div class="display">
        {{ currentInput || '---' }}
      </div>

      <p class="message">{{ message }}</p>

      <div class="stats">
        <p>Intentos usados: {{ service.getAttempts() }} / 5</p>
        <p>Intentos restantes: {{ service.getRemainingAttempts() }}</p>
      </div>

      <app-numeric-keyboard
        (keyPressed)="handleKey($event)">
      </app-numeric-keyboard>

      <ion-button
        expand="block"
        (click)="submitGuess()"
        [disabled]="service.isFinished()">

        Comprobar

      </ion-button>

    </div>

  </div>

</ion-content>
