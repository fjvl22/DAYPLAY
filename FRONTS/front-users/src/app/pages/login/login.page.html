<div class="login-wrapper" *ngIf="form">

  <div class="login-container">

    <h1>Inicio de Sesión</h1>

    <form [formGroup]="form" (ngSubmit)="login()">

      <ion-input
        class="custom-input"
        placeholder="Nombre de usuario"
        type="text"
        formControlName="nickname">
      </ion-input>

      <ion-text
        color="danger"
        *ngIf="form.get('nickname')?.touched && form.get('nickname')?.invalid">
        <small>El nombre de usuario es obligatorio.</small>
      </ion-text>

      <ion-input
        class="custom-input"
        placeholder="Contraseña"
        type="password"
        formControlName="password">
      </ion-input>

      <ion-text
        color="danger"
        *ngIf="form.get('password')?.touched && form.get('password')?.invalid">
        <small>La contraseña es obligatoria.</small>
      </ion-text>

      <ion-item lines="none" class="remember-me">
        <ion-checkbox
          slot="start"
          (ionChange)="onRemember($event)">
        </ion-checkbox>

        <ion-label>
          Recuérdame
        </ion-label>
      </ion-item>

      <p class="error-message" *ngIf="error">
        {{ error }}
      </p>

      <ion-button
        expand="block"
        class="login-button"
        type="submit"
        [disabled]="loading">

        {{ loading ? 'Cargando...' : 'Iniciar Sesión' }}

      </ion-button>

      <div class="redirect-link">
        <p>
          ¿Aún no tienes cuenta?
          <span (click)="goToRegister()">
            Regístrate aquí
          </span>
        </p>
      </div>

    </form>

  </div>

</div>
