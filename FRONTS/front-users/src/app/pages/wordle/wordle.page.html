<ion-header>
  <ion-toolbar>
    <ion-title>WORDLE</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="wordle-content">

  <div class="streak-intro" *ngIf="showIntroStreak">
    <img src="https://cdn-icons-png.flaticon.com/512/742/742751.png">
    <span>{{ currentStreak }}</span>
  </div>

  <div class="board">
    <div class="row" *ngFor="let row of grid; let rowIndex = index">
      <div
        class="cell"
        *ngFor="let cell of row; let colIndex = index"
        [ngClass]="cellStatus[rowIndex][colIndex]">
        {{ cell }}
      </div>
    </div>
  </div>

  <app-letters-keyboard
    [usedLetters]="usedLetters"
    [keyClasses]="keyClasses"
    [gameMode]="'wordle'"
    (letterPressed)="onLetter($event)"
    (backspacePressed)="onBackspace()"
    (enterPressed)="onEnter()">
  </app-letters-keyboard>

  <div class="streak-container" *ngIf="!showIntroStreak">
    <img src="https://cdn-icons-png.flaticon.com/512/742/742751.png">
    <span>{{ currentStreak }}</span>
  </div>

</ion-content>
