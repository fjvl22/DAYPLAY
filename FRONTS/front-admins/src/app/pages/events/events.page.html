<ion-header>
    <ion-toolbar color="dark">
        <ion-title>Eventos del sistema</ion-title>
    </ion-toolbar>
</ion-header>

<ion-content>

    <div *ngIf="loading" class="loading-container">
        <ion-spinner name="crescent"></ion-spinner>
    </div>

    <div *ngIf="!loading && events.length === 0" class="empty-container">
        <ion-icon name="document-outline"></ion-icon>
        <p>No hay eventos disponibles</p>
    </div>

    <ion-list *ngIf="!loading && events.length > 0">

        <ion-card *ngFor="let event of events">

            <ion-card-header>

                <div class="top-row">
                    <ion-badge [color]="getCategoryColor(event.category)">{{ event.category }}</ion-badge>

                    <span class="date">{{ event.createdAt | date: 'dd/MM/yyyy HH:mm' }}</span>
                </div>

                <ion-card-title>{{ event.eventType }}</ion-card-title>

            </ion-card-header>

            <ion-card-content>

                <p class="description">{{ event.description }}</p>

                <div class="extra-data">

                    <p *ngIf="event.userId">Usuario ID: {{ event.userId }}</p>

                    <p *ngIf="event.adminId">Admin ID: {{ event.adminId }}</p>

                    <p *ngIf="event.ipAddress">IP: {{ event.ipAddress }}</p>

                </div>

            </ion-card-content>

        </ion-card>

    </ion-list>

</ion-content>
