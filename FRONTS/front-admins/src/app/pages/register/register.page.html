<div class="register-wrapper">
  <div class="register-container">

    <h1>Registro</h1>

    <form [formGroup]="registerForm" (ngSubmit)="register()">

      <ion-input class="custom-input" placeholder="Nombre de Usuario" type="text" formControlName="nickname"></ion-input>

      <ion-input class="custom-input" placeholder="Correo Electrónico" type="email" formControlName="email"></ion-input>

      <ion-input class="custom-input" placeholder="Contraseña" type="password" formControlName="password"></ion-input>

      <ion-input class="custom-input" placeholder="Confirmar Contraseña" type="password" formControlName="confirmPassword"></ion-input>

      <p class="success-message" *ngIf="successMessage">{{ successMessage }}</p>

      <p class="error-message" *ngIf="errorMessage">{{ errorMessage }}</p>

      <ion-button expand="block" class="register-button" type="submit" [disabled]="loading">{{ loading ? 'Cargando...' : 'Registrarse' }}</ion-button>

    </form>

    <div class="login-link">
      <p>
        ¿Ya tienes cuenta?
        <span (click)="goToLogin()">Inicia sesión</span>
      </p>
    </div>

  </div>
</div>
