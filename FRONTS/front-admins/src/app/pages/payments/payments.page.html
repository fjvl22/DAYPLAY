<ion-header>
  <ion-toolbar>
    <ion-title>Pagos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <div class="ion-text-center" *ngIf="loading"><ion-spinner></ion-spinner></div>

  <div *ngIf="payments.length === 0" class="empty-container">
    <ion-icon name="document-outline"></ion-icon>
    <p>No hay pagos disponibles</p>
  </div>

  <ion-list *ngIf="!loading">

    <ion-item button *ngFor="let p of payments" (click)="openPayment(p.id!)">

      <ion-label>
        <h2>Pago #{{ p.id }}</h2>

        <p>💰 {{ p.amount }}</p>
        <p>📅 {{ p.date | date:'medium' }}</p>
        <p>📌 {{ p.status }}</p>

      </ion-label>

    </ion-item>

  </ion-list>

</ion-content>
